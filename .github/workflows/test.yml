name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Property tests exercise URL construction but make no real HTTP requests.
          # A dummy CloudFront base URL is sufficient.
          AWS_S3_PUBLIC_BASE_URL: https://example.cloudfront.net
